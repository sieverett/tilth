[project]
name = "tilth-agent"
version = "0.1.0"
description = "Reasoning agent that analyzes organizational memory"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40",
    "openai>=1.30",
    "httpx>=0.27",
    "pyyaml>=6.0",
    "tilth>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "mypy>=1.10",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tilth_agent"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
