[project]
name = "tilth"
version = "0.1.0"
description = "Fire-and-forget semantic memory client for services"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "respx>=0.21",
    "mypy>=1.10",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tilth"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
